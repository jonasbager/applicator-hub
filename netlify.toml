[build]
  command = "npm install --include=dev && npm run build"
  publish = "dist"
  functions = "netlify/functions"
  environment = { NODE_VERSION = "18" }

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[context.production]
  environment = { NODE_ENV = "production" }

[context.develop]
  environment = { NODE_ENV = "development" }

[context.deploy-preview]
  environment = { NODE_ENV = "development" }

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Sign-in / sign-up are now served by the SPA (Supabase Auth), so they fall
# through to the catch-all redirect below — no external auth-host redirects.

# Common redirects (for both environments)
[[redirects]]
  from = "/auth/callback"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/reset-password"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/jobs"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/archived"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/profile"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/recommended"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/.netlify/functions/generate-job-pdf"
  to = "/.netlify/functions/generate-job-pdf"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Path = {exclude = ["/*.png", "/*.ico", "/*.svg"]}}

[functions]
  node_bundler = "esbuild"

[functions.analyze-resume]
  included_files = []
  external_node_modules = ["pdf-parse", "mammoth", "@langchain/community", "@langchain/openai", "cheerio", "zod", "@supabase/supabase-js"]
  environment = { NODE_VERSION = "18.x" }

[functions.scrape-job]
  included_files = []
  external_node_modules = ["@langchain/community", "@langchain/openai", "cheerio", "zod", "axios", "@supabase/supabase-js"]
  environment = { NODE_VERSION = "18.x", OPENAI_API_KEY = "${OPENAI_API_KEY}" }

[functions.find-matching-jobs]
  included_files = []
  external_node_modules = ["linkedin-jobs-api", "@supabase/supabase-js", "axios", "openai"]
  environment = { NODE_VERSION = "18.x" }

[functions.generate-job-pdf]
  included_files = []
  external_node_modules = ["puppeteer-core", "@sparticuz/chromium", "@supabase/supabase-js"]
  environment = { NODE_VERSION = "18.x" }
  timeout = "30s"
  memory = 3008
